name: windows-build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-build.yml"
      - "frontend/**"
      - "cmd/**"
      - "core/**"
      - "go.mod"
      - "go.sum"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri Windows bundle
        working-directory: frontend
        env:
          SIDECAR_TARGET_TRIPLE: x86_64-pc-windows-msvc
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: syne-windows-bundles
          path: |
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
