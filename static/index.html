<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P2P Messenger Test UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape--one"></div>
    <div class="bg-shape bg-shape--two"></div>

    <main class="app">
      <header class="app__header">
        <p class="eyebrow">Local Test</p>
        <h1>P2P Chat Sandbox</h1>
        <p class="subtitle">
          Тестовый UI для отправки/приема сообщений. Пока работает локально и
          помогает проверять UX-поток.
        </p>
      </header>

      <section class="panel panel--compose">
        <label class="field">
          <span>Peer ID</span>
          <input id="peerId" type="text" placeholder="peer-1" value="peer-1" />
        </label>

        <label class="field">
          <span>Сообщение</span>
          <textarea
            id="message"
            rows="3"
            placeholder="Напиши сообщение и нажми Send"
          ></textarea>
        </label>

        <div class="actions">
          <button id="sendBtn" class="btn btn--primary" type="button">Send</button>
          <button id="simulateBtn" class="btn" type="button">Simulate Incoming</button>
          <button id="clearBtn" class="btn btn--danger" type="button">Clear Log</button>
        </div>
      </section>

      <section class="panel panel--log">
        <div class="panel__row">
          <h2>Event Log</h2>
          <span id="counter" class="counter">0 events</span>
        </div>
        <ul id="log" class="log" aria-live="polite"></ul>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
